<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agência de Turismo</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>✈️ Agência de Turismo</h1>

<div class="container">

    <!-- CHAT -->
    <div class="box">
        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Digite sua resposta..." />
            <button id="btnEnviar">Enviar</button>
        </div>
    </div>

    <!-- RESUMO -->
    <div class="box">
        <h2>📋 Sua Reserva</h2>

        <div class="resumo-item">Destino: <span id="r0">---</span></div>
        <div class="resumo-item">Pessoas: <span id="r1">---</span></div>
        <div class="resumo-item">Assento: <span id="r2">---</span></div>
        <div class="resumo-item">Dia: <span id="r3">---</span></div>
        <div class="resumo-item">Pacote: <span id="r4">---</span></div>
    </div>

</div>

<!-- 🔥 IMPORTANTE: apenas esse script -->
<script type="module" src="script.js"></script>

</body>
</html>
